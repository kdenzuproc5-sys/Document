 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="interface-container" class="active">
        <div class="crt-overlay"></div>
        
        <div class="hud-box">
            <h1 class="system-title">SYSTEM DIAGNOSTIC</h1>
            <p id="loading-subtitle">Initializing System...</p>
            
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
                <div class="status-row">
                    <span id="status-text">Booting core configurations...</span>
                    <span id="percentage-text">0%</span>
                </div>
            </div>

            <div id="console-log"></div>
        </div>
    </div>

    <div id="jumpscare-container">
        <img id="scare-image" src="Dc3c0e76453ee3ef8a5b97cf229764da.png" alt="" />
    </div>

    <script src="script.js"></script>
</body>
</html>
